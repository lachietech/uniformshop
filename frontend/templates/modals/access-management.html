<div id="userModal" class="modal">
    <div class="modal-content">
        <span id="userModalClose" class="close">&times;</span>
        <h2 id="userModalTitle">Manage User</h2>
        <div class="form-group">
            <label for="manageUserUsername">Username</label>
            <input type="text" id="manageUserUsername" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="manageUserRole">Role</label>
            <select id="manageUserRole">
                <option value="staff">Staff</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <div class="form-group checkbox-row">
            <label for="manageUserActive">Active account</label>
            <input type="checkbox" id="manageUserActive" checked>
        </div>
        <div class="form-group">
            <label for="manageUserPassword">Reset Password</label>
            <input type="password" id="manageUserPassword" autocomplete="new-password" placeholder="Leave blank to keep current password">
        </div>
        <button id="saveUserBtn" class="btn btn-primary" type="button">Save User</button>
        <button id="cancelUserBtn" class="btn btn-secondary" type="button">Cancel</button>
    </div>
</div>

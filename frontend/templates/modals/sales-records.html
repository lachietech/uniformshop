<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Edit Record: <span id="editTitle"></span></h2>
        <div id="editForm">
            <div id="editMonths" class="months-grid"></div>
            <button id="saveEditBtn" class="btn btn-primary" type="button">Save Changes</button>
            <button id="closeEditBtn" class="btn btn-secondary" type="button">Cancel</button>
            <button id="deleteBtn" class="btn btn-danger" type="button">Delete Record</button>
        </div>
    </div>
</div>

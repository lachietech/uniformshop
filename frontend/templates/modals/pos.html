<div id="posProductModal" class="modal">
    <div class="modal-content">
        <span id="posProductClose" class="close">&times;</span>
        <h2 id="posProductModalTitle">Add POS Product</h2>
        <div class="form-group">
            <label for="posProductName">Name</label>
            <input type="text" id="posProductName" placeholder="Product name">
        </div>
        <div class="form-group">
            <label for="posProductCategory">Category</label>
            <input type="text" id="posProductCategory" placeholder="Category">
        </div>
        <div class="form-group">
            <label for="posProductSize">Size</label>
            <input type="text" id="posProductSize" placeholder="Size (optional)">
        </div>
        <div class="form-group">
            <label for="posProductSku">SKU</label>
            <input type="text" id="posProductSku" placeholder="SKU (optional)">
        </div>
        <div class="form-group">
            <label for="posProductPrice">Price</label>
            <input type="number" id="posProductPrice" min="0" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="posProductStockOnHand">Stock On Hand</label>
            <input type="number" id="posProductStockOnHand" min="0" step="1" placeholder="0">
        </div>
        <div class="form-group">
            <label for="posProductStockWarehouse">Stock In Warehouse</label>
            <input type="number" id="posProductStockWarehouse" min="0" step="1" placeholder="0">
        </div>
        <button id="posSaveProductBtn" class="btn btn-primary" type="button">Save</button>
        <button id="posCancelProductBtn" class="btn btn-secondary" type="button">Cancel</button>
    </div>
</div>

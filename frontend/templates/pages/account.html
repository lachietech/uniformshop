<section id="account" class="section active">
    <div class="card">
        <div class="pos-header-row">
            <div>
                <h2>My Account</h2>
                <p>Update your sign-in password and review the current account security state.</p>
            </div>
        </div>
        <div id="accountNotice" class="status-message"></div>
        <div class="account-grid">
            <div class="access-panel">
                <h3>Password</h3>
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label for="currentPasswordInput">Current Password</label>
                        <input type="password" id="currentPasswordInput" autocomplete="current-password">
                    </div>
                    <div class="form-group">
                        <label for="newPasswordInput">New Password</label>
                        <input type="password" id="newPasswordInput" autocomplete="new-password" placeholder="At least 12 characters with upper, lower, and a number">
                    </div>
                    <div class="form-group">
                        <label for="confirmPasswordInput">Confirm New Password</label>
                        <input type="password" id="confirmPasswordInput" autocomplete="new-password">
                    </div>
                    <button id="changePasswordBtn" type="submit" class="btn btn-primary">Update Password</button>
                </form>
                <div id="changePasswordStatus" class="status-message"></div>
            </div>
            <div class="access-panel">
                <h3>Account Summary</h3>
                <div class="account-summary-list">
                    <div class="account-summary-item">
                        <span>Username</span>
                        <strong id="accountUsername">-</strong>
                    </div>
                    <div class="account-summary-item">
                        <span>Role</span>
                        <strong id="accountRole">-</strong>
                    </div>
                    <div class="account-summary-item">
                        <span>Password Status</span>
                        <strong id="accountPasswordState">Current</strong>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="pos" class="section active">
    <div class="card">
        <h2>Point of Sale</h2>
        <p>Process counter sales, capture payment, and manage live cart activity like a quick checkout lane.</p>

        <div class="filters">
            <div class="filter-group pos-group-filter">
                <label>Product Type:</label>
                <div class="pos-group-keys" id="posGroupKeys">
                    <button class="btn btn-secondary pos-group-btn active" type="button" data-pos-group="Shirts">Shirts</button>
                    <button class="btn btn-secondary pos-group-btn" type="button" data-pos-group="Shorts">Shorts</button>
                    <button class="btn btn-secondary pos-group-btn" type="button" data-pos-group="Skorts">Skorts</button>
                    <button class="btn btn-secondary pos-group-btn" type="button" data-pos-group="Hat">Hat</button>
                </div>
            </div>
            <div class="filter-group">
                <label for="posSearchInput">Search:</label>
                <input type="text" id="posSearchInput" placeholder="Search item, size, category, SKU" autocomplete="off">
            </div>
            <button id="posRefreshBtn" class="btn btn-secondary" type="button">Refresh Products</button>
        </div>

        <div class="pos-grid">
            <div class="pos-panel">
                <h3>Products</h3>
                <div id="posProducts" class="pos-products"></div>
            </div>

            <div class="pos-panel">
                <h3>Cart</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Price</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="posCartBody"></tbody>
                    </table>
                </div>

                <div class="pos-keypad-shell">
                    <div class="pos-keypad-header">
                        <span id="posSelectedItemLabel">No item selected</span>
                        <strong id="posKeypadDisplay">0</strong>
                    </div>
                    <div class="pos-keypad-grid">
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="7">7</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="8">8</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="9">9</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="4">4</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="5">5</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="6">6</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="1">1</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="2">2</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="3">3</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="0">0</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key="00">00</button>
                        <button class="btn btn-secondary pos-key-btn" type="button" data-key=".">.</button>
                    </div>
                    <div class="pos-keypad-actions">
                        <button id="posKeyBackBtn" class="btn btn-secondary" type="button">Back</button>
                        <button id="posKeyClearBtn" class="btn btn-secondary" type="button">Clear</button>
                        <button id="posSetQtyBtn" class="btn btn-primary" type="button">Set Qty</button>
                        <button id="posAddQtyBtn" class="btn btn-secondary" type="button">+ Qty</button>
                    </div>
                </div>

                <div class="pos-cart-summary">
                    <strong>Total: <span id="posCartTotal">$0.00</span></strong>
                </div>
                <p class="loading" style="padding-top: 0;">Receipt is saved automatically for every order.</p>
                <div>
                    <button id="posPayCashBtn" class="btn btn-primary" type="button">Pay Cash</button>
                    <button id="posPayCardBtn" class="btn btn-secondary" type="button">Pay Card</button>
                    <button id="posPayCenterPayBtn" class="btn btn-secondary" type="button">Center Pay</button>
                    <button id="posClearCartBtn" class="btn btn-danger" type="button">Clear</button>
                </div>
            </div>
        </div>
    </div>
</section>

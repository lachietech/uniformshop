<section id="view" class="section active">
    <div class="card">
        <h2>Sales Records</h2>
        <div class="filters">
            <div class="filter-group">
                <label>Category:</label>
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                    <option value="Shirts">Shirts</option>
                    <option value="Shorts">Shorts</option>
                    <option value="Hat">Hat</option>
                    <option value="Skorts">Skorts</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Size:</label>
                <select id="sizeFilter">
                    <option value="">All Sizes</option>
                </select>
            </div>
            <button id="filterBtn" class="btn btn-secondary" type="button">Apply Filters</button>
        </div>
        <div id="salesTable" class="table-container">
            <p class="loading">Loading data...</p>
        </div>
    </div>

    <div class="card">
        <h2>Add Monthly Sales Data</h2>
        <form id="addMonthForm">
            <div class="form-group">
                <label for="monthName">Month:</label>
                <input type="text" id="monthName" required placeholder="e.g., Apr-26, May-26">
            </div>
            <div id="monthInputsContainer" class="months-grid"></div>
            <button type="submit" class="btn btn-primary">Add Month to All</button>
        </form>
        <div id="monthStatus" class="status-message"></div>
    </div>
</section>

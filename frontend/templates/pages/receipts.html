<section id="receipts" class="section active">
    <div class="card">
        <h2>Receipt Register</h2>
        <p>View saved receipts generated by POS checkouts and open a receipt preview.</p>

        <div class="filters">
            <button id="receiptRefreshBtn" class="btn btn-secondary" type="button">Refresh</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Date</th>
                        <th>Payment</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="receiptHistoryBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>POS Order History</h2>
        <div class="filters">
            <div class="filter-group">
                <label for="posOrderDate">Order Date:</label>
                <input type="date" id="posOrderDate">
            </div>
            <button id="posFilterOrdersBtn" class="btn btn-secondary" type="button">Filter</button>
            <button id="posClearOrdersBtn" class="btn btn-secondary" type="button">Clear</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Order #</th>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Payment</th>
                        <th>Receipt Status</th>
                    </tr>
                </thead>
                <tbody id="posOrdersBody"></tbody>
            </table>
        </div>
    </div>

    <div id="receiptPreviewModal" class="modal">
        <div class="modal-content">
            <span id="receiptPreviewClose" class="close">&times;</span>
            <h2>Receipt Preview</h2>
            <pre id="receiptPreviewText" style="white-space: pre-wrap; font-family: Consolas, monospace; margin-top: 10px;"></pre>
        </div>
    </div>
</section>

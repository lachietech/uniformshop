<section id="access" class="section active">
    <div class="card">
        <div class="pos-header-row">
            <div>
                <h2>Access Management</h2>
                <p>Create users, assign roles, reset passwords, and disable old accounts.</p>
            </div>
            <button id="accessRefreshBtn" class="btn btn-secondary" type="button">Refresh Users</button>
        </div>
        <div id="accessStatus" class="status-message"></div>
        <div class="access-grid">
            <div class="access-panel">
                <h3>Create User</h3>
                <form id="createUserForm">
                    <div class="form-group">
                        <label for="newUserUsername">Username</label>
                        <input type="text" id="newUserUsername" autocomplete="off" placeholder="e.g. shop.staff">
                    </div>
                    <div class="form-group">
                        <label for="newUserPassword">Temporary Password</label>
                        <input type="password" id="newUserPassword" autocomplete="new-password" placeholder="At least 12 characters">
                    </div>
                    <div class="form-group">
                        <label for="newUserRole">Role</label>
                        <select id="newUserRole">
                            <option value="staff">Staff</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                    <button id="createUserBtn" type="submit" class="btn btn-primary">Add User</button>
                </form>
            </div>
            <div class="access-panel">
                <h3>Platform Users</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="access-audit-panel">
            <div class="pos-header-row">
                <div>
                    <h3>Recent Security Activity</h3>
                    <p>Latest sign-ins, password changes, and account administration actions.</p>
                </div>
                <button id="refreshAuditBtn" class="btn btn-secondary" type="button">Refresh Activity</button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Action</th>
                            <th>Actor</th>
                            <th>Target</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="auditLogBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</section>
